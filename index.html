<!doctype html>
<html lang="id" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <!-- Zoom left enabled for accessibility (no user-scalable=no). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Theme colour tracks the active surface (updated live by themeStore). -->
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />

    <title>Kanal · Pencatat Keuangan Pribadi</title>
    <meta
      name="description"
      content="Kanal adalah pencatat keuangan pribadi yang tenang, anti-gamifikasi, dengan visualisasi arus kas berbentuk sungai."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Kanal" />
    <meta property="og:description" content="Pencatat keuangan pribadi yang tenang." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Apple / installed web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kanal" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- No-flash theme bootstrap: set data-theme from the stored choice before
         the first paint, so a light-mode user never sees a dark flash. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('kanal:theme') || 'dark'
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var e = c === 'system' ? (sysDark ? 'dark' : 'light') : c === 'light' ? 'light' : 'dark'
          var root = document.documentElement
          root.setAttribute('data-theme', e)
          root.classList.toggle('dark', e === 'dark')
        } catch (err) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
